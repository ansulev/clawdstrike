name: CI Changed Paths

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect Changed Domains
    runs-on: ubuntu-latest
    outputs:
      rust_libs: ${{ steps.filter.outputs.rust_libs }}
      rust_services: ${{ steps.filter.outputs.rust_services }}
      rust_bridges: ${{ steps.filter.outputs.rust_bridges }}
      apps: ${{ steps.filter.outputs.apps }}
      packages_ts: ${{ steps.filter.outputs.packages_ts }}
      packages_py: ${{ steps.filter.outputs.packages_py }}
      docs: ${{ steps.filter.outputs.docs }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v6

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rust_libs:
              - "crates/libs/**"
              - "crates/tests/**"
              - "Cargo.toml"
              - "Cargo.lock"
            rust_services:
              - "crates/services/**"
              - "Cargo.toml"
              - "Cargo.lock"
            rust_bridges:
              - "crates/bridges/**"
              - "Cargo.toml"
              - "Cargo.lock"
            apps:
              - "apps/**"
            packages_ts:
              - "packages/adapters/**"
              - "packages/policy/**"
              - "packages/sdk/hush-ts/**"
              - "package.json"
              - "package-lock.json"
              - "scripts/smoke-ts-file-deps.sh"
            packages_py:
              - "packages/sdk/hush-py/**"
            docs:
              - "docs/**"
              - "README.md"
              - "CONTRIBUTING.md"
            infra:
              - "infra/**"
              - "Dockerfile.hushd"
              - ".github/workflows/**"
              - "scripts/path-lint.sh"
              - "scripts/move-validation.sh"
              - "scripts/architecture-guardrails.sh"

  ci-rust-libs:
    name: ci-rust-libs
    needs: changes
    if: needs.changes.outputs.rust_libs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Check Rust libs
        run: cargo check -p hush-core -p hush-proxy -p clawdstrike -p hush-certification -p hush-multi-agent -p hush-wasm -p spine

  ci-rust-services:
    name: ci-rust-services
    needs: changes
    if: needs.changes.outputs.rust_services == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Check Rust services
        run: cargo check -p hush-cli -p hushd -p spine-cli -p clawdstrike-cloud-api -p eas-anchor

  ci-rust-bridges:
    name: ci-rust-bridges
    needs: changes
    if: needs.changes.outputs.rust_bridges == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Check Rust bridges
        run: cargo check -p tetragon-bridge -p hubble-bridge

  ci-apps:
    name: ci-apps
    needs: changes
    if: needs.changes.outputs.apps == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            protobuf-compiler
          sudo apt-get install -y libwebkit2gtk-4.1-dev || sudo apt-get install -y libwebkit2gtk-4.0-dev

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Check Tauri crates
        run: |
          cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml
          cargo check --manifest-path apps/agent/src-tauri/Cargo.toml

      - name: Check desktop frontend
        run: |
          npm --prefix apps/desktop ci
          npm --prefix apps/desktop run typecheck

      - name: Check cloud dashboard
        run: |
          npm --prefix apps/cloud-dashboard ci
          npm --prefix apps/cloud-dashboard run typecheck
          npm --prefix apps/cloud-dashboard run build

  ci-packages-ts:
    name: ci-packages-ts
    needs: changes
    if: needs.changes.outputs.packages_ts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Run TS package smoke checks
        run: bash scripts/smoke-ts-file-deps.sh

  ci-packages-py:
    name: ci-packages-py
    needs: changes
    if: needs.changes.outputs.packages_py == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install and test Python SDK
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "packages/sdk/hush-py[dev]"
          python -m pytest -q packages/sdk/hush-py

  ci-docs:
    name: ci-docs
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate docs code blocks
        run: tools/scripts/validate-docs

  ci-infra:
    name: ci-infra
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate moved paths
        run: |
          bash scripts/path-lint.sh
          bash scripts/move-validation.sh
          bash scripts/architecture-guardrails.sh

      - name: Validate Docker Compose topology
        run: docker compose -f infra/docker/docker-compose.services.yaml config > /dev/null
