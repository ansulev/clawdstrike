# Build and push Docker images to GitHub Container Registry.
#
# Triggers:
# - Push to main branch (infra/docker/Cargo changes)
# - Manual workflow dispatch
#
# Images: ghcr.io/backbay-labs/clawdstrike/<service>:<tag>

name: Docker Build & Push

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "infra/docker/**"
      - "Dockerfile.hushd"
      - "Dockerfile.registry"
      - "infra/deploy/config.yaml"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/docker.yml"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional immutable tag to publish alongside latest and sha tags"
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/backbay-labs/clawdstrike

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spine:
    name: Spine (${{ matrix.bin }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bin: [spine-checkpointer, spine-witness, spine-proofs-api]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PUSH_TOKEN != '' && secrets.GHCR_PUSH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.spine
          build-args: BIN=${{ matrix.bin }}
          push: true
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/spine:${{ matrix.bin }}-latest
            ${{ env.IMAGE_PREFIX }}/spine:${{ matrix.bin }}-${{ github.sha }}
            ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && format('{0}/spine:{1}-{2}', env.IMAGE_PREFIX, matrix.bin, github.event.inputs.release_tag) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/spine:${{ matrix.bin }}-${{ github.sha }}
          format: 'table'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

