<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SDR Desktop</title>
  </head>
  <body>
    <div id="root"></div>
    <!--
      Some @backbay/glia primitives still consult `require("react")` at runtime via esbuild's
      `__require` helper. Vite runs this app as ESM, so we provide a minimal global `require`
      registry shim and populate it in `src/main.tsx` before any UI code imports glia.
    -->
    <script src="/sdr-require-shim.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
