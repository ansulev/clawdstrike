suite_id: provider-conformance-suite
suite_version: "1.0.0"
updated_at: "2026-02-18T00:00:00Z"

# Supported provider translators.
providers:
  - openai
  - claude
  # OpenClaw is validated by a dedicated runtime bridge suite:
  # fixtures/policy-events/openclaw-bridge/v1/cases.json

# Canonical CUA intents that all provider translators must support.
canonical_intents:
  - connect
  - input
  - clipboard_read
  - clipboard_write
  - file_transfer_upload
  - file_transfer_download
  - session_share
  - reconnect
  - disconnect

# Required parity fields: these canonical output fields must be identical
# across all providers for the same intent.
parity_fields:
  - eventType
  - data.cuaAction
  - data.direction

# Intent-to-canonical-event mapping.
# Each intent maps to a canonical eventType and cuaAction used by the policy engine.
intent_canonical_map:
  connect:
    eventType: remote.session.connect
    cuaAction: navigate
    direction: outbound
  input:
    eventType: input.inject
    cuaAction: click
    direction: null
  clipboard_read:
    eventType: remote.clipboard
    cuaAction: clipboard_read
    direction: read
  clipboard_write:
    eventType: remote.clipboard
    cuaAction: clipboard_write
    direction: write
  file_transfer_upload:
    eventType: remote.file_transfer
    cuaAction: file_transfer
    direction: upload
  file_transfer_download:
    eventType: remote.file_transfer
    cuaAction: file_transfer
    direction: download
  session_share:
    eventType: remote.session_share
    cuaAction: session_share
    direction: null
  reconnect:
    eventType: remote.session.reconnect
    cuaAction: reconnect
    direction: null
  disconnect:
    eventType: remote.session.disconnect
    cuaAction: disconnect
    direction: null

# Provider-specific input schemas.
# Each provider sends actions in its own format; the translator normalizes them.
provider_input_schemas:
  openai:
    tool_name: computer_use
    action_field: action
    action_values:
      connect: navigate
      input: click
      clipboard_read: clipboard_read
      clipboard_write: clipboard_write
      file_transfer_upload: file_upload
      file_transfer_download: file_download
      session_share: session_share
      reconnect: reconnect
      disconnect: disconnect
    coordinate_fields:
      x: x
      y: y
    text_field: text
    url_field: url
  claude:
    tool_name: computer
    action_field: action
    action_values:
      connect: navigate
      input: mouse_click
      clipboard_read: clipboard_read
      clipboard_write: clipboard_write
      file_transfer_upload: file_upload
      file_transfer_download: file_download
      session_share: session_share
      reconnect: reconnect
      disconnect: disconnect
    coordinate_fields:
      x: coordinate_x
      y: coordinate_y
    text_field: text
    url_field: url
# Fail-closed error codes.
fail_closed_codes:
  provider_unknown: PRV_PROVIDER_UNKNOWN
  intent_unknown: PRV_INTENT_UNKNOWN
  parity_violation: PRV_PARITY_VIOLATION
  translation_error: PRV_TRANSLATION_ERROR
  missing_required_field: PRV_MISSING_REQUIRED_FIELD
