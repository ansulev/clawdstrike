# Simple hushd Docker Compose example
# Usage: docker compose up -d

services:
  hushd:
    build:
      context: ../..
      dockerfile: Dockerfile.hushd
    ports:
      - "8080:8080"
    volumes:
      - ./policy.yaml:/etc/hushd/policy.yaml:ro
      - ./config.yaml:/etc/hushd/config.yaml:ro
      - hushd-data:/var/lib/hushd
    environment:
      - CLAWDSTRIKE_LOG_LEVEL=info
      - CLAWDSTRIKE_API_KEY=${CLAWDSTRIKE_API_KEY:-changeme}
    healthcheck:
      test: ["CMD-SHELL", "hushd status http://127.0.0.1:8080 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  hushd-data:
