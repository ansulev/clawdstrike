version: 1.2.0
name: Synthesized Policy
description: Auto-generated from observed policy events
extends: null
merge_strategy: deep_merge
guards:
  forbidden_path:
    enabled: true
    exceptions: []
    additional_patterns: []
    remove_patterns: []
  path_allowlist:
    enabled: true
    file_access_allow:
    - /home/agent/workspace/**
    - /tmp/**
    file_write_allow:
    - /home/agent/workspace/**
    - /tmp/**
    patch_allow:
    - /home/agent/workspace/src/**
  egress_allowlist:
    enabled: true
    allow:
    - api.example.com
    - crates.io
    - registry.npmjs.org
    block: []
    default_action: block
    additional_allow: []
    remove_allow: []
    additional_block: []
    remove_block: []
  secret_leak:
    enabled: true
    redact: true
    severity_threshold: error
    patterns:
    - name: aws_access_key
      pattern: AKIA[0-9A-Z]{16}
      severity: critical
      luhn_check: false
    - name: aws_secret_key
      pattern: (?i)aws[_\-]?secret[_\-]?access[_\-]?key['"]?\s*[:=]\s*['"]?[A-Za-z0-9/+=]{40}
      severity: critical
      luhn_check: false
    - name: github_token
      pattern: gh[ps]_[A-Za-z0-9]{36}
      severity: critical
      luhn_check: false
    - name: github_pat
      pattern: github_pat_[A-Za-z0-9]{22}_[A-Za-z0-9]{59}
      severity: critical
      luhn_check: false
    - name: openai_key
      pattern: sk-[A-Za-z0-9]{48}
      severity: critical
      luhn_check: false
    - name: openai_project_key
      pattern: sk-proj-[A-Za-z0-9]{48,}
      severity: critical
      luhn_check: false
    - name: anthropic_key
      pattern: sk-ant-[A-Za-z0-9\-]{95}
      severity: critical
      luhn_check: false
    - name: anthropic_api03_key
      pattern: sk-ant-api03-[A-Za-z0-9_\-]{93}
      severity: critical
      luhn_check: false
    - name: private_key
      pattern: '-----BEGIN\s+(RSA\s+)?PRIVATE\s+KEY-----'
      severity: critical
      luhn_check: false
    - name: npm_token
      pattern: npm_[A-Za-z0-9]{36}
      severity: critical
      luhn_check: false
    - name: slack_token
      pattern: xox[baprs]-[0-9]{10,13}-[0-9]{10,13}[a-zA-Z0-9-]*
      severity: critical
      luhn_check: false
    - name: stripe_secret_key
      pattern: sk_live_[A-Za-z0-9]{24,}
      severity: critical
      luhn_check: false
    - name: stripe_restricted_key
      pattern: rk_live_[A-Za-z0-9]{24,}
      severity: critical
      luhn_check: false
    - name: gcp_service_account
      pattern: '"type"\s*:\s*"service_account"'
      severity: critical
      luhn_check: false
    - name: azure_key_vault_token
      pattern: (?i)azure[_\-]?(?:key[_\-]?vault|kv)[_\-]?(?:secret|token|key)['"]?\s*[:=]\s*['"]?[A-Za-z0-9+/=_\-]{32,}
      severity: critical
      luhn_check: false
    - name: gitlab_pat
      pattern: glpat-[A-Za-z0-9_\-]{20,}
      severity: critical
      luhn_check: false
    - name: generic_api_key
      pattern: (?i)(api[_\-]?key|apikey)[\x27"]?\s*[:=]\s*[\x27"]?[A-Za-z0-9]{32,}
      severity: warning
      luhn_check: false
    - name: generic_secret
      pattern: (?i)(secret|password|passwd|pwd)['"]?\s*[:=]\s*['"]?[A-Za-z0-9!@#$%^&*]{8,}
      severity: warning
      luhn_check: false
    additional_patterns: []
    remove_patterns: []
    skip_paths:
    - '**/test/**'
    - '**/tests/**'
    - '**/*_test.*'
    - '**/*.test.*'
  patch_integrity: null
  shell_command: null
  mcp_tool: null
  prompt_injection: null
  jailbreak: null
  computer_use: null
  remote_desktop_side_channel: null
  input_injection_capability: null
  custom: []
custom_guards: []
settings: {}
posture:
  initial: work
  states:
    quarantine:
      description: Lockdown state on critical violations
      capabilities: []
      budgets: {}
    work:
      description: Synthesized working state
      capabilities:
      - file_access
      - file_write
      - egress
      - mcp_tool
      - patch
      - shell
      budgets:
        shell_commands: 7
        patches: 6
        egress_calls: 8
        file_writes: 8
        mcp_tool_calls: 7
  transitions:
  - from: '*'
    to: quarantine
    on: critical_violation
    requires: []
