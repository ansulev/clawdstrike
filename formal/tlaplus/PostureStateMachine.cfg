\* TLC Model Checking Configuration for PostureStateMachine
\*
\* Run with:
\*   java -jar tla2tools.jar -config PostureStateMachine.cfg PostureStateMachine.tla
\*
\* This uses the concrete model values defined in the .tla file,
\* instantiated to match the ai-agent-posture.yaml built-in ruleset
\* (with small budget values for tractable model checking).
\*
\* Maps to: rulesets/ai-agent-posture.yaml
\* Maps to: crates/libs/clawdstrike/src/posture.rs

\* ---------------------------------------------------------------
\* CONSTANTS
\* ---------------------------------------------------------------

CONSTANTS
    States          = ModelStates
    InitState       = ModelInitState
    StateOrder      = ModelStateOrder
    BudgetLimit     = ModelBudgetLimit
    TransitionMap   = ModelTransitionMap
    AbsorbingStates = ModelAbsorbingStates

\* ---------------------------------------------------------------
\* SPECIFICATION (includes fairness for liveness checking)
\* ---------------------------------------------------------------

SPECIFICATION Spec

\* ---------------------------------------------------------------
\* INVARIANTS (safety properties checked at every reachable state)
\*
\* Safety combines:
\*   - TypeOK: type correctness of all variables
\*   - BudgetNonNegative: budget >= 0 (models u64 + saturating_sub)
\*   - StateValid: currentState is always in States
\*   - MonotonicityInvariant: enforcement transitions never relax posture
\* ---------------------------------------------------------------

INVARIANT Safety
INVARIANT AbsorbingStatesHaveNoTransitions

\* ---------------------------------------------------------------
\* PROPERTIES (temporal / liveness properties)
\*
\* BudgetExhaustionProgress: if budget hits zero and a transition
\*   exists, the system eventually transitions (not stuck forever).
\*   Requires WF_vars(BudgetExhaustedTransition) from Fairness.
\* ---------------------------------------------------------------

PROPERTY BudgetExhaustionProgress
PROPERTY EventualQuiescence
PROPERTY AbsorbingStateStable
