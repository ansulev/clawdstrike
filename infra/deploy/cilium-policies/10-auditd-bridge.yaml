apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: auditd-bridge
  namespace: clawdstrike
  labels:
    app.kubernetes.io/part-of: clawdstrike
spec:
  description: "Auditd bridge: local audit log ingest, publish to NATS, expose admin health/metrics"
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: auditd-bridge
  ingress:
    # Prometheus bridge admin metrics and readiness
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
            app.kubernetes.io/name: prometheus
      toPorts:
        - ports:
            - port: "2112"
              protocol: TCP
  egress:
    # NATS JetStream
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: clawdstrike
            app.kubernetes.io/component: nats
      toPorts:
        - ports:
            - port: "4222"
              protocol: TCP
    # DNS
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
