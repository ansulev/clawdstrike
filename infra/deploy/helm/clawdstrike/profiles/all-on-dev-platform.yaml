# All-on profile for platform-dev.
# Enables bridges, monitoring, and network policy hardening while requiring
# out-of-band secret provisioning for any sensitive material. Public ingress and
# public NATS exposure stay disabled here until a separate secure override adds
# TLS and authenticated endpoints.
global:
  namespace: clawdstrike
  imagePullSecrets:
    - name: ghcr-pull
  nodeSelector:
    kubernetes.io/arch: amd64

namespace:
  create: true
  name: clawdstrike

externalSecrets:
  enabled: true
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  secrets:
    spine:
      enabled: true
      remoteKey: "platform-dev/clawdstrike-spine"
    hushd:
      enabled: true
      remoteKey: "platform-dev/clawdstrike-hushd"
    controlApi:
      enabled: true
      remoteKey: "platform-dev/clawdstrike-control-api"
    controlApiPostgres:
      enabled: true
      remoteKey: "platform-dev/clawdstrike-control-api-postgres"
    easAnchor:
      enabled: true
      remoteKey: "platform-dev/clawdstrike-eas-anchor"

spine:
  secrets:
    existingSecret: "clawdstrike-helm-spine"
  image:
    tag: "spine-checkpointer-2ba330f736d108a1ff37e4d17782edc9532eb73e"
  checkpointer:
    streamReplicas: 1

hushd:
  image:
    tag: "2ba330f736d108a1ff37e4d17782edc9532eb73e"
  auth:
    enabled: true
    existingSecret: "clawdstrike-helm-hushd"
  persistence:
    enabled: false

controlApi:
  enabled: true
  # Leave blank here so agents are not pointed at a public insecure NATS
  # endpoint. Secure public enrollment should supply a TLS-protected external
  # URL from a separate override.
  agentNatsUrl: ""
  secrets:
    existingSecret: "clawdstrike-helm-control-api"
  env:
    RUST_LOG: "info,clawdstrike_control_api=debug"
    NATS_PROVISIONING_MODE: "mock"
    NATS_PROVISIONER_BASE_URL: ""
    NATS_ALLOW_INSECURE_MOCK_PROVISIONER: "true"
    APPROVAL_SIGNING_ENABLED: "true"
    APPROVAL_RESOLUTION_OUTBOX_ENABLED: "true"
    APPROVAL_RESOLUTION_OUTBOX_POLL_INTERVAL_SECS: "5"
    AUDIT_CONSUMER_ENABLED: "false"
    APPROVAL_CONSUMER_ENABLED: "false"
    HEARTBEAT_CONSUMER_ENABLED: "false"
    STALE_DETECTOR_ENABLED: "false"
  postgres:
    enabled: true
    existingSecret: "clawdstrike-helm-control-api-postgres"
    persistence:
      enabled: false

nats:
  jetstream:
    maxFileStoreBytes: "25769803776"
  publicService:
    enabled: false

bridges:
  tetragon:
    enabled: true
    image:
      tag: "2ba330f736d108a1ff37e4d17782edc9532eb73e"
    grpcEndpoint: "http://localhost:54321"
    adminPort: 22112
    hostNetwork: true
    dnsPolicy: ClusterFirstWithHostNet
    probes:
      enabled: false
    nodeSelector:
      kubernetes.io/arch: amd64
  hubble:
    enabled: true
    replicas: 1
    image:
      tag: "2ba330f736d108a1ff37e4d17782edc9532eb73e"
    grpcEndpoint: "http://hubble-relay.kube-system.svc.cluster.local:80"
    nodeSelector:
      kubernetes.io/arch: amd64
  auditd:
    enabled: true
    image:
      tag: "2ba330f736d108a1ff37e4d17782edc9532eb73e"
    nodeSelector:
      kubernetes.io/arch: amd64
  k8sAudit:
    enabled: true
    replicas: 1
    image:
      tag: "2ba330f736d108a1ff37e4d17782edc9532eb73e"
    nodeSelector:
      kubernetes.io/arch: amd64

spiffe:
  enabled: true

easAnchor:
  # Keep disabled in platform-dev until the Base EAS schemas have been
  # registered and their UIDs are provided here.
  enabled: false
  image:
    tag: "2ba330f736d108a1ff37e4d17782edc9532eb73e"
  chain:
    rpcUrl: "https://sepolia.base.org"
    chainId: 84532
  secrets:
    existingSecret: "clawdstrike-helm-eas-anchor"

ingress:
  enabled: false
  className: alb
  commonAnnotations:
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/group.name: clawdstrike
  hushd:
    enabled: false
    host: hushd.clawdstrike.dev.backbay.io
    path: /
    pathType: Prefix
    annotations:
      alb.ingress.kubernetes.io/healthcheck-path: /health
      external-dns.alpha.kubernetes.io/hostname: hushd.clawdstrike.dev.backbay.io
  controlApi:
    enabled: false
    host: control-api.clawdstrike.dev.backbay.io
    path: /
    pathType: Prefix
    annotations:
      alb.ingress.kubernetes.io/healthcheck-path: /api/v1/health
      external-dns.alpha.kubernetes.io/hostname: control-api.clawdstrike.dev.backbay.io
  proofsApi:
    enabled: false
    host: proofs-api.clawdstrike.dev.backbay.io
    path: /
    pathType: Prefix
    annotations:
      alb.ingress.kubernetes.io/healthcheck-path: /healthz
      external-dns.alpha.kubernetes.io/hostname: proofs-api.clawdstrike.dev.backbay.io

serviceMonitor:
  enabled: true
  endpoints:
    nats: true
    hushd: true
    proofsApi: false

networkPolicy:
  enabled: true
  allowHubbleRelayEgress: true
  hubbleRelay:
    namespace: kube-system
    podSelector:
      k8s-app: hubble-relay
    ports:
      - 80
      - 4245
