{{- if .Values.bridges.auditd.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "clawdstrike.fullname" . }}-auditd-bridge
  namespace: {{ include "clawdstrike.namespace" . }}
  labels:
    {{- include "clawdstrike.componentLabels" (dict "ctx" . "component" "auditd-bridge") | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "clawdstrike.componentSelectorLabels" (dict "ctx" . "component" "auditd-bridge") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "clawdstrike.componentLabels" (dict "ctx" . "component" "auditd-bridge") | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- include "clawdstrike.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "clawdstrike.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: auditd-bridge
          image: "{{ .Values.bridges.auditd.image.repository }}:{{ .Values.bridges.auditd.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: NATS_URL
              value: {{ include "clawdstrike.natsUrl" . | quote }}
            - name: AUDIT_LOG_PATH
              value: {{ .Values.bridges.auditd.auditLogPath | quote }}
            - name: RUST_LOG
              value: {{ .Values.bridges.auditd.env.RUST_LOG | quote }}
            - name: STREAM_MAX_BYTES
              value: {{ .Values.bridges.auditd.env.STREAM_MAX_BYTES | int64 | quote }}
            - name: STREAM_MAX_AGE_SECONDS
              value: {{ .Values.bridges.auditd.env.STREAM_MAX_AGE_SECONDS | int64 | quote }}
            - name: NATS_STARTUP_TIMEOUT_SECS
              value: {{ .Values.bridges.auditd.env.NATS_STARTUP_TIMEOUT_SECS | int64 | quote }}
            - name: GROUP_TIMEOUT_MS
              value: {{ .Values.bridges.auditd.env.GROUP_TIMEOUT_MS | int64 | quote }}
            {{- if .Values.spiffe.enabled }}
            - name: SVID_PATH
              value: {{ .Values.spiffe.svidPath | quote }}
            {{- end }}
          volumeMounts:
            - name: audit-log
              mountPath: /var/log/audit
              readOnly: true
            {{- if .Values.spiffe.enabled }}
            - name: spiffe-workload
              mountPath: /var/run/spire/agent
              readOnly: true
            {{- end }}
          livenessProbe:
            exec:
              command: ["test", "-f", "/proc/1/status"]
            initialDelaySeconds: 5
            periodSeconds: 15
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.bridges.auditd.resources | nindent 12 }}
      volumes:
        - name: audit-log
          hostPath:
            path: /var/log/audit
            type: DirectoryOrCreate
        {{- if .Values.spiffe.enabled }}
        - name: spiffe-workload
          csi:
            driver: "csi.spiffe.io"
            readOnly: true
        {{- end }}
      {{- with .Values.bridges.auditd.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.bridges.auditd.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
