{{- if .Values.bridges.tetragon.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "clawdstrike.fullname" . }}-tetragon-bridge
  namespace: {{ include "clawdstrike.namespace" . }}
  labels:
    {{- include "clawdstrike.componentLabels" (dict "ctx" . "component" "tetragon-bridge") | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "clawdstrike.componentSelectorLabels" (dict "ctx" . "component" "tetragon-bridge") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "clawdstrike.componentLabels" (dict "ctx" . "component" "tetragon-bridge") | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- include "clawdstrike.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "clawdstrike.serviceAccountName" . }}
      hostNetwork: {{ .Values.bridges.tetragon.hostNetwork }}
      dnsPolicy: {{ .Values.bridges.tetragon.dnsPolicy }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: tetragon-bridge
          image: "{{ .Values.bridges.tetragon.image.repository }}:{{ .Values.bridges.tetragon.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          {{- $tetragonOutboxPath := .Values.bridges.tetragon.env.OUTBOX_PATH }}
          {{- if .Values.bridges.tetragon.outboxPersistence.enabled }}
          {{- $tetragonOutboxPath = printf "%s/%s" .Values.bridges.tetragon.outboxPersistence.mountPath .Values.bridges.tetragon.outboxPersistence.fileName }}
          {{- end }}
          ports:
            - name: admin
              containerPort: {{ .Values.bridges.tetragon.adminPort }}
              protocol: TCP
          env:
            - name: NATS_URL
              value: {{ include "clawdstrike.natsUrl" . | quote }}
            - name: TETRAGON_ENDPOINT
              value: {{ .Values.bridges.tetragon.grpcEndpoint | quote }}
            - name: ADMIN_LISTEN_ADDR
              value: "0.0.0.0:{{ .Values.bridges.tetragon.adminPort }}"
            - name: RUST_LOG
              value: {{ .Values.bridges.tetragon.env.RUST_LOG | quote }}
            - name: STREAM_MAX_BYTES
              value: {{ .Values.bridges.tetragon.env.STREAM_MAX_BYTES | int64 | quote }}
            - name: STREAM_MAX_AGE_SECONDS
              value: {{ .Values.bridges.tetragon.env.STREAM_MAX_AGE_SECONDS | int64 | quote }}
            - name: NATS_STARTUP_TIMEOUT_SECS
              value: {{ .Values.bridges.tetragon.env.NATS_STARTUP_TIMEOUT_SECS | int64 | quote }}
            - name: OUTBOX_ENABLED
              value: {{ .Values.bridges.tetragon.env.OUTBOX_ENABLED | quote }}
            - name: OUTBOX_PATH
              value: {{ $tetragonOutboxPath | quote }}
            - name: OUTBOX_FLUSH_INTERVAL_MS
              value: {{ .Values.bridges.tetragon.env.OUTBOX_FLUSH_INTERVAL_MS | int64 | quote }}
            - name: OUTBOX_MAX_PENDING
              value: {{ .Values.bridges.tetragon.env.OUTBOX_MAX_PENDING | int64 | quote }}
            - name: OUTBOX_RETRY_BASE_MS
              value: {{ .Values.bridges.tetragon.env.OUTBOX_RETRY_BASE_MS | int64 | quote }}
            - name: OUTBOX_RETRY_MAX_MS
              value: {{ .Values.bridges.tetragon.env.OUTBOX_RETRY_MAX_MS | int64 | quote }}
            - name: READINESS_OUTBOX_DEGRADED_THRESHOLD
              value: {{ .Values.bridges.tetragon.env.READINESS_OUTBOX_DEGRADED_THRESHOLD | int64 | quote }}
            {{- if .Values.spiffe.enabled }}
            - name: SVID_PATH
              value: {{ .Values.spiffe.svidPath | quote }}
            {{- end }}
          {{- if or .Values.bridges.tetragon.outboxPersistence.enabled .Values.spiffe.enabled }}
          volumeMounts:
            {{- if .Values.bridges.tetragon.outboxPersistence.enabled }}
            - name: outbox
              mountPath: {{ .Values.bridges.tetragon.outboxPersistence.mountPath | quote }}
            {{- end }}
            {{- if .Values.spiffe.enabled }}
            - name: spiffe-workload
              mountPath: /var/run/spire/agent
              readOnly: true
            {{- end }}
          {{- end }}
          {{- if .Values.bridges.tetragon.probes.enabled }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: admin
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: admin
            initialDelaySeconds: 3
            periodSeconds: 10
          {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.bridges.tetragon.resources | nindent 12 }}
      {{- if or .Values.bridges.tetragon.outboxPersistence.enabled .Values.spiffe.enabled }}
      volumes:
        {{- if .Values.bridges.tetragon.outboxPersistence.enabled }}
        - name: outbox
          {{- if eq .Values.bridges.tetragon.outboxPersistence.type "hostPath" }}
          hostPath:
            path: {{ .Values.bridges.tetragon.outboxPersistence.hostPath.path | quote }}
            type: {{ .Values.bridges.tetragon.outboxPersistence.hostPath.type | quote }}
          {{- else if eq .Values.bridges.tetragon.outboxPersistence.type "pvc" }}
          persistentVolumeClaim:
            claimName: {{ .Values.bridges.tetragon.outboxPersistence.pvc.existingClaim | default (printf "%s-tetragon-bridge-outbox" (include "clawdstrike.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
        {{- if .Values.spiffe.enabled }}
        - name: spiffe-workload
          csi:
            driver: "csi.spiffe.io"
            readOnly: true
        {{- end }}
      {{- end }}
      {{- with .Values.bridges.tetragon.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.bridges.tetragon.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
