{{- if .Values.bridges.tetragon.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "clawdstrike.fullname" . }}-tetragon-bridge
  namespace: {{ include "clawdstrike.namespace" . }}
  labels:
    {{- include "clawdstrike.componentLabels" (dict "ctx" . "component" "tetragon-bridge") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: admin
      port: {{ .Values.bridges.tetragon.adminPort }}
      targetPort: admin
      protocol: TCP
  selector:
    {{- include "clawdstrike.componentSelectorLabels" (dict "ctx" . "component" "tetragon-bridge") | nindent 4 }}
{{- end }}
