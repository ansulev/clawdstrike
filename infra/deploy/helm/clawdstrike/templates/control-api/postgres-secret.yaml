{{- if and .Values.controlApi.enabled .Values.controlApi.postgres.enabled (not .Values.controlApi.postgres.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clawdstrike.controlApiPostgresName" . }}
  namespace: {{ include "clawdstrike.namespace" . }}
  labels:
    {{- include "clawdstrike.componentLabels" (dict "ctx" . "component" "control-api-postgres") | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_DB: {{ .Values.controlApi.postgres.database | quote }}
  POSTGRES_USER: {{ .Values.controlApi.postgres.username | quote }}
  POSTGRES_PASSWORD: {{ required "controlApi.postgres.password is required when controlApi.postgres.enabled" .Values.controlApi.postgres.password | quote }}
{{- end }}
