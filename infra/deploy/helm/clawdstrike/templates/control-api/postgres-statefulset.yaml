{{- if and .Values.controlApi.enabled .Values.controlApi.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "clawdstrike.controlApiPostgresName" . }}
  namespace: {{ include "clawdstrike.namespace" . }}
  labels:
    {{- include "clawdstrike.componentLabels" (dict "ctx" . "component" "control-api-postgres") | nindent 4 }}
spec:
  serviceName: {{ include "clawdstrike.controlApiPostgresName" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "clawdstrike.componentSelectorLabels" (dict "ctx" . "component" "control-api-postgres") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "clawdstrike.componentLabels" (dict "ctx" . "component" "control-api-postgres") | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- include "clawdstrike.imagePullSecrets" . | nindent 6 }}
      {{- include "clawdstrike.globalScheduling" . | nindent 6 }}
      containers:
        - name: postgres
          image: "{{ .Values.controlApi.postgres.image.repository }}:{{ .Values.controlApi.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            - secretRef:
                name: {{ .Values.controlApi.postgres.existingSecret | default (include "clawdstrike.controlApiPostgresName" .) }}
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.controlApi.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      {{- if not .Values.controlApi.postgres.persistence.enabled }}
      volumes:
        - name: data
          emptyDir: {}
      {{- end }}
  {{- if .Values.controlApi.postgres.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "clawdstrike.componentLabels" (dict "ctx" . "component" "control-api-postgres") | nindent 10 }}
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.controlApi.postgres.persistence.storageClassName }}
        storageClassName: {{ .Values.controlApi.postgres.persistence.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.controlApi.postgres.persistence.size }}
  {{- end }}
{{- end }}
