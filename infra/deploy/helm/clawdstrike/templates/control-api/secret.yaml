{{- if and .Values.controlApi.enabled (not .Values.controlApi.secrets.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clawdstrike.controlApiName" . }}
  namespace: {{ include "clawdstrike.namespace" . }}
  labels:
    {{- include "clawdstrike.componentLabels" (dict "ctx" . "component" "control-api") | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ required "controlApi.databaseUrl or controlApi.postgres.enabled is required when controlApi.enabled" (include "clawdstrike.controlApiDatabaseUrl" .) | quote }}
  JWT_SECRET: {{ required "controlApi.secrets.jwtSecret is required when controlApi.enabled and no existing secret is provided" .Values.controlApi.secrets.jwtSecret | quote }}
  STRIPE_SECRET_KEY: {{ required "controlApi.secrets.stripeSecretKey is required when controlApi.enabled and no existing secret is provided" .Values.controlApi.secrets.stripeSecretKey | quote }}
  STRIPE_WEBHOOK_SECRET: {{ required "controlApi.secrets.stripeWebhookSecret is required when controlApi.enabled and no existing secret is provided" .Values.controlApi.secrets.stripeWebhookSecret | quote }}
  NATS_PROVISIONER_API_TOKEN: {{ .Values.controlApi.secrets.natsProvisionerApiToken | quote }}
  APPROVAL_SIGNING_KEYPAIR: {{ .Values.controlApi.secrets.approvalSigningKeypair | quote }}
{{- end }}
