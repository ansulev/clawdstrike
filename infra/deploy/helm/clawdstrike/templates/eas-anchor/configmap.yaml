{{- if .Values.easAnchor.enabled }}
{{- $policyAttestationUid := required "easAnchor.schemas.policyAttestationUid is required when easAnchor.enabled=true" .Values.easAnchor.schemas.policyAttestationUid }}
{{- $checkpointAnchorUid := required "easAnchor.schemas.checkpointAnchorUid is required when easAnchor.enabled=true" .Values.easAnchor.schemas.checkpointAnchorUid }}
{{- $keyRotationUid := required "easAnchor.schemas.keyRotationUid is required when easAnchor.enabled=true" .Values.easAnchor.schemas.keyRotationUid }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "clawdstrike.fullname" . }}-eas-anchor
  namespace: {{ include "clawdstrike.namespace" . }}
  labels:
    {{- include "clawdstrike.componentLabels" (dict "ctx" . "component" "eas-anchor") | nindent 4 }}
data:
  config.toml: |
    [chain]
    rpc_url = {{ .Values.easAnchor.chain.rpcUrl | quote }}
    chain_id = {{ .Values.easAnchor.chain.chainId }}
    eas_contract = {{ .Values.easAnchor.chain.easContract | quote }}
    schema_registry = {{ .Values.easAnchor.chain.schemaRegistry | quote }}

    [signer]
    private_key_env = "EAS_SIGNER_PRIVATE_KEY"

    [batching]
    max_batch_size = {{ .Values.easAnchor.batching.maxBatchSize }}
    batch_interval_secs = {{ .Values.easAnchor.batching.batchIntervalSecs }}
    min_batch_size = {{ .Values.easAnchor.batching.minBatchSize }}

    [schemas]
    policy_attestation_uid = {{ $policyAttestationUid | quote }}
    checkpoint_anchor_uid = {{ $checkpointAnchorUid | quote }}
    key_rotation_uid = {{ $keyRotationUid | quote }}

    [nats]
    url = {{ include "clawdstrike.natsUrl" . | quote }}
    subject = {{ .Values.easAnchor.nats.subject | quote }}
{{- end }}
