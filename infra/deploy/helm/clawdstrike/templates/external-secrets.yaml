{{- if and .Values.externalSecrets.enabled .Values.externalSecrets.secrets.spine.enabled }}
{{- $remoteKey := required "externalSecrets.secrets.spine.remoteKey is required when enabled" .Values.externalSecrets.secrets.spine.remoteKey }}
{{- $targetName := required "externalSecrets.secrets.spine.targetName or spine.secrets.existingSecret is required when enabled" (.Values.externalSecrets.secrets.spine.targetName | default .Values.spine.secrets.existingSecret) }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ printf "%s-external" $targetName | trunc 63 | trimSuffix "-" }}
  namespace: {{ include "clawdstrike.namespace" . }}
  labels:
    {{- include "clawdstrike.componentLabels" (dict "ctx" . "component" "spine-secrets") | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    kind: {{ .Values.externalSecrets.secretStoreRef.kind | quote }}
    name: {{ .Values.externalSecrets.secretStoreRef.name | quote }}
  target:
    creationPolicy: Owner
    deletionPolicy: Retain
    name: {{ $targetName | quote }}
  data:
    - secretKey: SPINE_LOG_SEED_HEX
      remoteRef:
        key: {{ $remoteKey | quote }}
        property: SPINE_LOG_SEED_HEX
    - secretKey: SPINE_WITNESS_SEED_HEX
      remoteRef:
        key: {{ $remoteKey | quote }}
        property: SPINE_WITNESS_SEED_HEX
{{- end }}
