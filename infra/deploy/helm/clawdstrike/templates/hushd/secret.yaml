{{- if and .Values.hushd.enabled .Values.hushd.auth.enabled (not .Values.hushd.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clawdstrike.fullname" . }}-hushd
  namespace: {{ include "clawdstrike.namespace" . }}
  labels:
    {{- include "clawdstrike.componentLabels" (dict "ctx" . "component" "hushd") | nindent 4 }}
type: Opaque
stringData:
  CLAWDSTRIKE_API_KEY: {{ required "hushd.auth.apiKey is required when hushd.auth.enabled and no existingSecret is provided" .Values.hushd.auth.apiKey | quote }}
  CLAWDSTRIKE_ADMIN_KEY: {{ required "hushd.auth.adminKey is required when hushd.auth.enabled and no existingSecret is provided" .Values.hushd.auth.adminKey | quote }}
  CLAWDSTRIKE_AUTH_PEPPER: {{ required "hushd.auth.pepper is required when hushd.auth.enabled and no existingSecret is provided" .Values.hushd.auth.pepper | quote }}
{{- end }}
