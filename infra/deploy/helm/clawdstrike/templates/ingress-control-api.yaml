{{- if and .Values.ingress.enabled .Values.ingress.controlApi.enabled .Values.controlApi.enabled }}
{{- $annotations := dict }}
{{- range $k, $v := .Values.ingress.commonAnnotations }}
{{- $_ := set $annotations $k $v }}
{{- end }}
{{- range $k, $v := .Values.ingress.controlApi.annotations }}
{{- $_ := set $annotations $k $v }}
{{- end }}
{{- $listenPorts := index $annotations "alb.ingress.kubernetes.io/listen-ports" | default "" }}
{{- $certificateArn := index $annotations "alb.ingress.kubernetes.io/certificate-arn" | default "" }}
{{- $hasAlbTls := and (contains "HTTPS" $listenPorts) (ne $certificateArn "") }}
{{- if and (not .Values.ingress.controlApi.tls) (not $hasAlbTls) }}
{{- fail "public controlApi ingress requires TLS via ingress.controlApi.tls or ALB HTTPS annotations" }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "clawdstrike.controlApiName" . }}
  namespace: {{ include "clawdstrike.namespace" . }}
  labels:
    {{- include "clawdstrike.componentLabels" (dict "ctx" . "component" "control-api") | nindent 4 }}
  {{- if $annotations }}
  annotations:
    {{- toYaml $annotations | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- end }}
  {{- if .Values.ingress.controlApi.tls }}
  tls:
    {{- toYaml .Values.ingress.controlApi.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.controlApi.host | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.controlApi.path }}
            pathType: {{ .Values.ingress.controlApi.pathType }}
            backend:
              service:
                name: {{ include "clawdstrike.controlApiName" . }}
                port:
                  name: http
{{- end }}
