{{- if .Values.networkPolicy.enabled }}
{{- $allowExternalControlApi := and .Values.controlApi.enabled (or (ne .Values.controlApi.service.type "ClusterIP") (and .Values.ingress.enabled .Values.ingress.controlApi.enabled)) }}
{{- $allowExternalProofsApi := and .Values.spine.enabled .Values.spine.proofsApi.enabled (or (ne .Values.spine.proofsApi.service.type "ClusterIP") (and .Values.ingress.enabled .Values.ingress.proofsApi.enabled)) }}
{{- $allowExternalHushd := and .Values.hushd.enabled (or (ne .Values.hushd.service.type "ClusterIP") (and .Values.ingress.enabled .Values.ingress.hushd.enabled)) }}
{{- $allowExternalNats := and .Values.nats.enabled (not .Values.nats.external.enabled) .Values.nats.publicService.enabled .Values.nats.publicService.allowInsecureUnauthenticated }}
{{- $allowExternalK8sAudit := and .Values.bridges.k8sAudit.enabled (ne .Values.bridges.k8sAudit.service.type "ClusterIP") }}
{{- $hasExternalIngress := or $allowExternalControlApi $allowExternalProofsApi $allowExternalHushd $allowExternalNats $allowExternalK8sAudit }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "clawdstrike.fullname" . }}
  namespace: {{ include "clawdstrike.namespace" . }}
  labels:
    {{- include "clawdstrike.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: clawdstrike
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow intra-namespace communication
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: clawdstrike
    {{- if and .Values.nats.enabled .Values.nats.monitoring.enabled }}
    # Allow Helm test hook pod to hit NATS health endpoint
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: test
      ports:
        - port: {{ .Values.nats.monitoring.port }}
          protocol: TCP
    {{- end }}
    {{- if and .Values.serviceMonitor.enabled (or (and .Values.serviceMonitor.endpoints.bridgeAdmin (or .Values.bridges.tetragon.enabled .Values.bridges.hubble.enabled .Values.bridges.auditd.enabled)) (and .Values.serviceMonitor.endpoints.k8sAuditBridge .Values.bridges.k8sAudit.enabled)) }}
    # Allow Prometheus in monitoring namespace to scrape bridge health/metrics endpoints
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        {{- if and .Values.serviceMonitor.endpoints.bridgeAdmin .Values.bridges.tetragon.enabled }}
        - port: {{ .Values.bridges.tetragon.adminPort }}
          protocol: TCP
        {{- end }}
        {{- if and .Values.serviceMonitor.endpoints.bridgeAdmin .Values.bridges.hubble.enabled }}
        - port: {{ .Values.bridges.hubble.adminPort }}
          protocol: TCP
        {{- end }}
        {{- if and .Values.serviceMonitor.endpoints.bridgeAdmin .Values.bridges.auditd.enabled }}
        - port: {{ .Values.bridges.auditd.adminPort }}
          protocol: TCP
        {{- end }}
        {{- if and .Values.serviceMonitor.endpoints.k8sAuditBridge .Values.bridges.k8sAudit.enabled }}
        - port: {{ .Values.bridges.k8sAudit.service.port }}
          protocol: TCP
        {{- end }}
    {{- end }}
    {{- if $hasExternalIngress }}
    # Allow explicitly configured public services and ingress-backed endpoints
    - ports:
        {{- if $allowExternalControlApi }}
        - port: {{ .Values.controlApi.port }}
          protocol: TCP
        {{- end }}
        {{- if $allowExternalProofsApi }}
        - port: {{ .Values.spine.proofsApi.port }}
          protocol: TCP
        {{- end }}
        {{- if $allowExternalHushd }}
        - port: {{ .Values.hushd.port }}
          protocol: TCP
        {{- end }}
        {{- if $allowExternalNats }}
        - port: {{ .Values.nats.publicService.port }}
          protocol: TCP
        {{- end }}
        {{- if $allowExternalK8sAudit }}
        - port: {{ .Values.bridges.k8sAudit.service.port }}
          protocol: TCP
        {{- end }}
    {{- end }}
  egress:
    # Allow intra-namespace communication
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: clawdstrike
    {{- if and .Values.networkPolicy.allowHubbleRelayEgress .Values.bridges.hubble.enabled }}
    # Allow bridge egress to Hubble Relay in kube-system
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.hubbleRelay.namespace | quote }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.hubbleRelay.podSelector | nindent 14 }}
      ports:
        {{- range .Values.networkPolicy.hubbleRelay.ports }}
        - port: {{ . }}
          protocol: TCP
        {{- end }}
    {{- end }}
    # Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
