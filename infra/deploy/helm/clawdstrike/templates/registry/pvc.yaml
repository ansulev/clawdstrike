{{- if and .Values.registry.enabled .Values.registry.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "clawdstrike.fullname" . }}-registry
  namespace: {{ include "clawdstrike.namespace" . }}
  labels:
    {{- include "clawdstrike.componentLabels" (dict "ctx" . "component" "registry") | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.registry.persistence.storageClassName }}
  storageClassName: {{ .Values.registry.persistence.storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.registry.persistence.size }}
{{- end }}
