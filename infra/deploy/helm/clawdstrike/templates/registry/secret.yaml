{{- if and .Values.registry.enabled .Values.registry.auth.enabled (not .Values.registry.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clawdstrike.fullname" . }}-registry
  namespace: {{ include "clawdstrike.namespace" . }}
  labels:
    {{- include "clawdstrike.componentLabels" (dict "ctx" . "component" "registry") | nindent 4 }}
type: Opaque
stringData:
  CLAWDSTRIKE_REGISTRY_API_KEY: {{ required "registry.auth.apiKey must be set when auth is enabled and no existingSecret is provided" .Values.registry.auth.apiKey | quote }}
{{- end }}
