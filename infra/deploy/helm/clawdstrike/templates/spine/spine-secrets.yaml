{{- $checkpointerSeed := and .Values.spine.checkpointer.enabled (eq .Values.spine.checkpointer.mode "run") -}}
{{- $witnessSeed := .Values.spine.witness.enabled -}}
{{- if and .Values.spine.enabled (not .Values.spine.secrets.existingSecret) (or $checkpointerSeed $witnessSeed) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clawdstrike.fullname" . }}-spine
  namespace: {{ include "clawdstrike.namespace" . }}
  labels:
    {{- include "clawdstrike.componentLabels" (dict "ctx" . "component" "spine") | nindent 4 }}
type: Opaque
stringData:
  {{- if $checkpointerSeed }}
  SPINE_LOG_SEED_HEX: {{ required "spine.checkpointer.logSeedHex is required" .Values.spine.checkpointer.logSeedHex | quote }}
  {{- end }}
  {{- if $witnessSeed }}
  SPINE_WITNESS_SEED_HEX: {{ required "spine.witness.seedHex is required" .Values.spine.witness.seedHex | quote }}
  {{- end }}
{{- end }}
