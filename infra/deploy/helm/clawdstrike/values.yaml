# -- Global settings
global:
  # -- Image pull policy
  imagePullPolicy: IfNotPresent
  # -- Image pull secrets
  imagePullSecrets: []
  # -- Optional node selector applied to all workloads
  nodeSelector: {}
  # -- Optional tolerations applied to all workloads
  tolerations: []
  # -- Override namespace (defaults to Release.Namespace)
  namespace: ""

# -- Override chart name
nameOverride: ""
# -- Override full release name
fullnameOverride: ""

# -- Namespace creation
namespace:
  create: true
  name: "clawdstrike-system"

# ---------------------------------------------------------------------------
# NATS JetStream
# ---------------------------------------------------------------------------
nats:
  # -- Enable bundled NATS deployment
  enabled: true
  # -- Use an external NATS cluster instead of deploying one
  external:
    enabled: false
    url: ""
  image:
    repository: nats
    tag: "2.10-alpine"
  replicas: 1
  jetstream:
    enabled: true
    # -- JetStream max file store bytes (0 lets NATS auto-compute from disk)
    maxFileStoreBytes: 0
    storage:
      size: 10Gi
      storageClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  monitoring:
    enabled: true
    port: 8222

# ---------------------------------------------------------------------------
# Spine services (checkpointer, witness, proofs-api)
# ---------------------------------------------------------------------------
spine:
  enabled: true
  image:
    repository: ghcr.io/backbay-labs/clawdstrike/spine
    # -- Overrides appVersion for spine images
    tag: ""
  env:
    RUST_LOG: "info,spine=debug"
  secrets:
    # -- Name of existing Secret containing SPINE_LOG_SEED_HEX and SPINE_WITNESS_SEED_HEX
    existingSecret: ""

  checkpointer:
    enabled: true
    replicas: 1
    # -- Checkpointer mode (`run` starts a Deployment; `repair` runs a one-shot Job)
    mode: run
    # -- Apply destructive writes in repair mode (`--repair-apply`)
    repairApply: false
    # -- Hex-encoded 32-byte Ed25519 seed for spine-checkpointer (SPINE_LOG_SEED_HEX)
    logSeedHex: ""
    # -- JetStream replication factor to request when creating Spine streams
    streamReplicas: 1
    # -- Chain enforcement mode (`warn` logs violations, `strict` quarantines and drops)
    chainEnforcement: warn
    # -- KV bucket storing per-issuer chain heads
    issuerHeadsBucket: CLAWDSTRIKE_ISSUER_HEADS
    # -- JetStream stream for strict-mode chain violations
    chainViolationStream: CLAWDSTRIKE_CHAIN_VIOLATIONS
    # -- Subject for strict-mode chain violation events
    chainViolationSubject: clawdstrike.spine.chain_violation.v1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi

  witness:
    enabled: true
    replicas: 1
    # -- Hex-encoded 32-byte Ed25519 seed for spine-witness (SPINE_WITNESS_SEED_HEX)
    seedHex: ""
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 128Mi

  proofsApi:
    enabled: true
    replicas: 1
    port: 8080
    # -- KV bucket storing per-issuer chain heads
    issuerHeadsBucket: CLAWDSTRIKE_ISSUER_HEADS
    # -- JetStream stream containing strict-mode chain violation events
    chainViolationStream: CLAWDSTRIKE_CHAIN_VIOLATIONS
    # -- Maximum events scanned by /v1/chain_violation_stats
    chainViolationStatsScanCap: 10000
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
    service:
      type: ClusterIP
      port: 8080

# ---------------------------------------------------------------------------
# hushd (enforcement daemon)
# ---------------------------------------------------------------------------
hushd:
  enabled: true
  image:
    repository: ghcr.io/backbay-labs/clawdstrike/hushd
    tag: ""
  replicas: 1
  port: 9876
  config:
    ruleset: "default"
    logLevel: "info"
  auth:
    enabled: true
    # -- Name of existing Secret containing CLAWDSTRIKE_API_KEY and CLAWDSTRIKE_ADMIN_KEY
    existingSecret: ""
    # -- API key (only used if existingSecret is empty; stored in auto-generated Secret)
    apiKey: ""
    adminKey: ""
  persistence:
    enabled: true
    size: 1Gi
    storageClassName: ""
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  service:
    type: ClusterIP
    port: 9876
  # -- Topology spread constraints for hushd pods (e.g., spread across AZs)
  topologySpreadConstraints: []
  # - maxSkew: 1
  #   topologyKey: topology.kubernetes.io/zone
  #   whenUnsatisfiable: DoNotSchedule
  #   labelSelector:
  #     matchLabels:
  #       app.kubernetes.io/component: hushd
  # -- Affinity rules for hushd pods (e.g., pod anti-affinity)
  affinity: {}
  # podAntiAffinity:
  #   preferredDuringSchedulingIgnoredDuringExecution:
  #     - weight: 100
  #       podAffinityTerm:
  #         labelSelector:
  #           matchExpressions:
  #             - key: app.kubernetes.io/component
  #               operator: In
  #               values: ["hushd"]
  #         topologyKey: kubernetes.io/hostname

# ---------------------------------------------------------------------------
# Registry (package registry)
# ---------------------------------------------------------------------------
registry:
  enabled: false
  image:
    repository: ghcr.io/backbay-labs/clawdstrike/registry
    tag: ""
  replicas: 1
  port: 3100
  auth:
    enabled: true
    existingSecret: ""
    apiKey: ""
  persistence:
    enabled: true
    size: 5Gi
    storageClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi
  service:
    type: ClusterIP
    port: 3100

# ---------------------------------------------------------------------------
# Bridge workloads
# ---------------------------------------------------------------------------
bridges:
  tetragon:
    enabled: false
    image:
      repository: ghcr.io/backbay-labs/clawdstrike/tetragon-bridge
      tag: ""
    grpcEndpoint: "http://localhost:54321"
    adminPort: 2112
    hostNetwork: true
    dnsPolicy: ClusterFirstWithHostNet
    env:
      RUST_LOG: "info,tetragon_bridge=debug"
      STREAM_MAX_BYTES: 1073741824
      STREAM_MAX_AGE_SECONDS: 86400
      NATS_STARTUP_TIMEOUT_SECS: 90
      OUTBOX_ENABLED: false
      OUTBOX_PATH: "/tmp/tetragon-bridge-outbox.db"
      OUTBOX_FLUSH_INTERVAL_MS: 1000
      OUTBOX_MAX_PENDING: 10000
      OUTBOX_RETRY_BASE_MS: 500
      OUTBOX_RETRY_MAX_MS: 30000
      READINESS_OUTBOX_DEGRADED_THRESHOLD: 100
    outboxPersistence:
      enabled: false
      # DaemonSet default: hostPath per node. Alternative: pvc (requires RWX-capable class).
      type: hostPath
      mountPath: /var/lib/clawdstrike/tetragon-bridge/outbox
      fileName: outbox.db
      hostPath:
        path: /var/lib/clawdstrike/tetragon-bridge/outbox
        type: DirectoryOrCreate
      pvc:
        create: true
        existingClaim: ""
        storageClassName: ""
        accessModes:
          - ReadWriteMany
        size: 2Gi
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
    # -- Node selector for bridge DaemonSet
    nodeSelector: {}
    tolerations: []

  hubble:
    enabled: false
    replicas: 1
    image:
      repository: ghcr.io/backbay-labs/clawdstrike/hubble-bridge
      tag: ""
    grpcEndpoint: "http://hubble-relay.kube-system.svc.cluster.local:80"
    adminPort: 2112
    hostNetwork: false
    dnsPolicy: ClusterFirst
    env:
      RUST_LOG: "info,hubble_bridge=debug"
      STREAM_MAX_BYTES: 1073741824
      STREAM_MAX_AGE_SECONDS: 86400
      NATS_STARTUP_TIMEOUT_SECS: 90
      OUTBOX_ENABLED: false
      OUTBOX_PATH: "/tmp/hubble-bridge-outbox.db"
      OUTBOX_FLUSH_INTERVAL_MS: 1000
      OUTBOX_MAX_PENDING: 10000
      OUTBOX_RETRY_BASE_MS: 500
      OUTBOX_RETRY_MAX_MS: 30000
      READINESS_OUTBOX_DEGRADED_THRESHOLD: 100
    outboxPersistence:
      enabled: false
      # Deployment supports either hostPath or pvc.
      type: pvc
      mountPath: /var/lib/clawdstrike/hubble-bridge/outbox
      fileName: outbox.db
      hostPath:
        path: /var/lib/clawdstrike/hubble-bridge/outbox
        type: DirectoryOrCreate
      pvc:
        create: true
        existingClaim: ""
        storageClassName: ""
        accessModes:
          - ReadWriteOnce
        size: 2Gi
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
    nodeSelector: {}
    tolerations: []

  auditd:
    enabled: false
    image:
      repository: ghcr.io/backbay-labs/clawdstrike/auditd-bridge
      tag: ""
    auditLogPath: "/var/log/audit/audit.log"
    adminPort: 2112
    env:
      RUST_LOG: "info,auditd_bridge=debug"
      STREAM_MAX_BYTES: 1073741824
      STREAM_MAX_AGE_SECONDS: 86400
      NATS_STARTUP_TIMEOUT_SECS: 90
      GROUP_TIMEOUT_MS: 500
      OUTBOX_ENABLED: false
      OUTBOX_PATH: "/tmp/auditd-bridge-outbox.db"
      OUTBOX_FLUSH_INTERVAL_MS: 1000
      OUTBOX_MAX_PENDING: 10000
      OUTBOX_RETRY_BASE_MS: 500
      OUTBOX_RETRY_MAX_MS: 30000
      READINESS_OUTBOX_DEGRADED_THRESHOLD: 100
    outboxPersistence:
      enabled: false
      # DaemonSet default: hostPath per node. Alternative: pvc (requires RWX-capable class).
      type: hostPath
      mountPath: /var/lib/clawdstrike/auditd-bridge/outbox
      fileName: outbox.db
      hostPath:
        path: /var/lib/clawdstrike/auditd-bridge/outbox
        type: DirectoryOrCreate
      pvc:
        create: true
        existingClaim: ""
        storageClassName: ""
        accessModes:
          - ReadWriteMany
        size: 2Gi
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
    # -- Node selector for bridge DaemonSet
    nodeSelector: {}
    tolerations: []

  k8sAudit:
    enabled: false
    replicas: 1
    image:
      repository: ghcr.io/backbay-labs/clawdstrike/k8s-audit-bridge
      tag: ""
    port: 9877
    env:
      RUST_LOG: "info,k8s_audit_bridge=debug"
      STREAM_MAX_BYTES: 1073741824
      STREAM_MAX_AGE_SECONDS: 86400
      NATS_STARTUP_TIMEOUT_SECS: 90
      OUTBOX_ENABLED: false
      OUTBOX_PATH: "/tmp/k8s-audit-bridge-outbox.db"
      OUTBOX_FLUSH_INTERVAL_MS: 1000
      OUTBOX_MAX_PENDING: 10000
      OUTBOX_RETRY_BASE_MS: 500
      OUTBOX_RETRY_MAX_MS: 30000
      READINESS_OUTBOX_DEGRADED_THRESHOLD: 100
    outboxPersistence:
      enabled: false
      # Deployment supports either hostPath or pvc.
      type: pvc
      mountPath: /var/lib/clawdstrike/k8s-audit-bridge/outbox
      fileName: outbox.db
      hostPath:
        path: /var/lib/clawdstrike/k8s-audit-bridge/outbox
        type: DirectoryOrCreate
      pvc:
        create: true
        existingClaim: ""
        storageClassName: ""
        accessModes:
          - ReadWriteOnce
        size: 2Gi
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
    service:
      type: ClusterIP
      port: 9877
    nodeSelector: {}
    tolerations: []

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: ""
  commonAnnotations: {}
  hushd:
    enabled: true
    host: hushd.clawdstrike.local
    path: /
    pathType: Prefix
    annotations: {}
    tls: []
  proofsApi:
    enabled: true
    host: proofs-api.clawdstrike.local
    path: /
    pathType: Prefix
    annotations: {}
    tls: []
  registry:
    enabled: false
    host: registry.clawdstrike.dev
    path: /
    pathType: Prefix
    annotations: {}
    tls: []

# ---------------------------------------------------------------------------
# Monitoring
# ---------------------------------------------------------------------------
serviceMonitor:
  enabled: false
  interval: 30s
  labels: {}
  endpoints:
    nats: true
    hushd: true
    proofsApi: false
    bridgeAdmin: false
    k8sAuditBridge: false

# ---------------------------------------------------------------------------
# EAS Anchor (on-chain checkpoint anchoring to Base L2)
# ---------------------------------------------------------------------------
easAnchor:
  enabled: false
  image:
    repository: ghcr.io/backbay-labs/clawdstrike/eas-anchor
    tag: ""
  chain:
    # Base Sepolia testnet (change to https://mainnet.base.org / 8453 for prod)
    rpcUrl: "https://sepolia.base.org"
    chainId: 84532
    easContract: "0xA1207F3BBa224E2c9c3c6D5aF63D816e6e1f8e4b"
    schemaRegistry: "0xA7b39296258348C78294F95B872b282326A97BDF"
  batching:
    maxBatchSize: 50
    batchIntervalSecs: 300
    minBatchSize: 1
  schemas:
    # Populate after running: npx ts-node scripts/register-eas-schemas.ts
    policyAttestationUid: ""
    checkpointAnchorUid: ""
    keyRotationUid: ""
  nats:
    subject: "clawdstrike.spine.envelope.log_checkpoint.v1"
  secrets:
    existingSecret: ""
  env:
    RUST_LOG: "info,eas_anchor=debug"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ---------------------------------------------------------------------------
# SPIFFE / SPIRE identity binding
# ---------------------------------------------------------------------------
spiffe:
  # -- Mount SPIFFE workload SVIDs into bridge pods via the SPIRE CSI driver
  enabled: false
  # -- Path inside the container where the SVID PEM is written
  svidPath: "/var/run/spire/agent/svid.pem"

# ---------------------------------------------------------------------------
# Network Policy
# ---------------------------------------------------------------------------
networkPolicy:
  enabled: false
  allowHubbleRelayEgress: true
  hubbleRelay:
    namespace: kube-system
    podSelector:
      k8s-app: hubble-relay
    ports:
      - 80
      - 4245

# ---------------------------------------------------------------------------
# RBAC
# ---------------------------------------------------------------------------
serviceAccount:
  create: true
  name: ""
  annotations: {}

# ---------------------------------------------------------------------------
# Autoscaling
# ---------------------------------------------------------------------------
autoscaling:
  # -- Enable HorizontalPodAutoscaler for hushd and proofs-api
  enabled: false
  hushd:
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  proofsApi:
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# ---------------------------------------------------------------------------
# Pod Disruption Budget
# ---------------------------------------------------------------------------
podDisruptionBudget:
  # -- Enable PodDisruptionBudgets for hushd and proofs-api
  enabled: false
  hushd:
    minAvailable: 1
  proofsApi:
    minAvailable: 1

# ---------------------------------------------------------------------------
# Pod-level settings (applied to all components unless overridden)
# ---------------------------------------------------------------------------
podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]
