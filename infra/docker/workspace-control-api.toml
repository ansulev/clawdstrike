[workspace]
resolver = "2"
members = [
    "crates/libs/hush-core",
    "crates/libs/spine",
    "crates/services/control-api",
]

[workspace.package]
version = "0.2.6"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/backbay-labs/clawdstrike"
rust-version = "1.93"

[workspace.dependencies]
# Crypto
ed25519-dalek = { version = "2.2", features = ["rand_core", "zeroize"] }
zeroize = "1"
sha2 = "0.10"
sha3 = "0.10"
rand = "0.9"
rand_core = { version = "0.6", features = ["getrandom"] }
hex = "0.4"
base64 = "0.22"
openssl = { version = "0.10", features = ["vendored"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
ryu = "1.0"

# Async runtime
tokio = { version = "1.49", features = ["full"] }
async-trait = "0.1"

# Error handling
thiserror = "2.0"
anyhow = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Time
chrono = { version = "0.4", features = ["serde"] }
chrono-tz = { version = "0.10", features = ["serde"] }

# UUID
uuid = { version = "1.21", features = ["v4", "v7", "serde", "js"] }

# CLI
clap = { version = "4.5", features = ["derive", "env"] }

# HTTP server
axum = { version = "0.8", features = ["macros"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "limit", "trace"] }
rustls = "0.23"
rustls-pki-types = "1.14"
tokio-rustls = "0.26"

# Database
sqlx-core = { version = "0.8", default-features = false, features = ["json", "chrono", "uuid", "migrate", "_rt-tokio"] }
sqlx-postgres = { version = "0.8", default-features = false, features = ["chrono", "uuid", "json"] }

# Async utilities
tokio-stream = { version = "0.1", features = ["sync"] }
futures = "0.3"

# HTTP client
reqwest = { version = "0.13", default-features = false, features = ["json", "rustls", "multipart"] }

# JWT
jsonwebtoken = { version = "10", default-features = false, features = ["aws_lc_rs", "use_pem"] }

# Internal crates
hush-core = { path = "crates/libs/hush-core", version = "0.2.6" }
spine = { package = "hush-spine", path = "crates/libs/spine", version = "0.2.6" }

[profile.release]
lto = true
codegen-units = 1

[workspace.lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
