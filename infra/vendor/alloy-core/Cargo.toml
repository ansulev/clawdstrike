[package]
edition = "2024"
rust-version = "1.85"
name = "alloy-core"
version = "1.5.7"
authors = ["Alloy Contributors"]
build = false
exclude = ["tests"]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Rust Ethereum core libraries"
homepage = "https://github.com/alloy-rs/core/tree/main/crates/core"
