map = ["alloy-primitives/map"]
map-foldhash = ["alloy-primitives/map-foldhash"]
map-fxhash = ["alloy-primitives/map-fxhash"]
map-hashbrown = ["alloy-primitives/map-hashbrown"]
map-indexmap = ["alloy-primitives/map-indexmap"]
