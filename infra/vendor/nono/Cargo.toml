[package]
name = "nono"
version = "0.11.0"
edition = "2021"
rust-version = "1.74"
authors = ["Luke Hinds"]
license = "Apache-2.0"
repository = "https://github.com/always-further/nono"
homepage = "https://github.com/always-further/nono"
description = "Capability-based sandboxing library using Landlock (Linux) and Seatbelt (macOS)"
readme = "README.md"
keywords = ["sandbox", "security", "capability", "landlock", "seatbelt"]
categories = ["os", "api-bindings"]

[features]
default = ["sandbox"]
# Core sandbox enforcement (Landlock/Seatbelt) — requires Unix
sandbox = []
# Stub features — optional deps removed from this vendored copy since
# clawdstrike only enables "sandbox". Keeps lib.rs cfg gates compiling.
keystore = []
trust = []
undo = []

[dependencies]
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1.0.149"
tracing = "0.1"
zeroize = { version = "1", features = ["alloc"] }
sha2 = "0.10"
getrandom = "0.4"
walkdir = "2"
globset = "0.4"

# Unix-only dependencies for sandbox enforcement
[target.'cfg(unix)'.dependencies]
libc = "0.2"

[target.'cfg(target_os = "linux")'.dependencies]
landlock = "0.4"
nix = { version = "0.31.2", features = ["fs", "user"] }

[target.'cfg(target_os = "macos")'.dependencies]
nix = { version = "0.31.2", features = ["fs", "user"] }

[dev-dependencies]
tempfile = "3"
