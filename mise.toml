[tools]
rust = "1.93"
node = "24"
python = "3.12"

[tasks.check]
description = "Run cargo check on workspace and Tauri app crates"
run = """
cargo check --workspace
cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml
cargo check --manifest-path apps/agent/src-tauri/Cargo.toml
"""

[tasks.test]
description = "Run all tests"
run = "cargo test --workspace"

[tasks.lint]
description = "Run clippy lints"
run = "cargo clippy --workspace -- -D warnings"

[tasks.fmt]
description = "Format code"
run = "cargo fmt --all"

[tasks.fmt-check]
description = "Check code formatting"
run = "cargo fmt --all -- --check"

[tasks.deny]
description = "Run cargo-deny checks"
run = """
cargo deny check
cargo metadata --manifest-path apps/desktop/src-tauri/Cargo.toml --format-version 1 --locked > /tmp/desktop-tauri-metadata.json
cargo deny check --metadata-path /tmp/desktop-tauri-metadata.json licenses sources
"""

[tasks.doc]
description = "Build documentation"
run = "cargo doc --no-deps --all-features"

[tasks."test:rust"]
description = "Rust workspace tests and app crate checks"
run = """
cargo test --workspace
cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml
cargo check --manifest-path apps/agent/src-tauri/Cargo.toml
"""

[tasks."test:apps"]
description = "App checks for desktop, control console, and Tauri backends"
run = """
(cd apps/desktop && bun install --frozen-lockfile)
(cd apps/desktop && bun run typecheck)
(cd apps/desktop && bun run test)
(cd apps/desktop && bun run build)
npm --prefix apps/control-console ci
npm --prefix apps/control-console test
npm --prefix apps/control-console run typecheck
npm --prefix apps/control-console run build
cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml
cargo check --manifest-path apps/agent/src-tauri/Cargo.toml
"""

[tasks."test:tui"]
description = "Terminal TUI typecheck, tests, and wrapper smokes"
run = """
(cd apps/terminal && bun install --frozen-lockfile)
(cd apps/terminal && bun run typecheck)
(cd apps/terminal && bun test)
cargo test -p hush-cli tui::tests -- --nocapture
"""

[tasks."test:packages:ts"]
description = "TypeScript package smoke checks"
run = "bash scripts/smoke-ts-file-deps.sh"

[tasks."test:packages:py"]
description = "Python SDK tests"
run = """
VENV_DIR="${VENV_DIR:-/tmp/hushpy-venv}"
if [[ ! -d "$VENV_DIR" ]]; then
  python3 -m venv "$VENV_DIR"
  "$VENV_DIR/bin/python" -m pip install -U pip
fi
"$VENV_DIR/bin/python" -m pip install -e "packages/sdk/hush-py[dev]"
"$VENV_DIR/bin/python" -m pytest -q packages/sdk/hush-py
"""

[tasks."ci:changed"]
description = "Run path-aware checks for changed files versus main"
run = "bash scripts/ci-changed.sh"

[tasks.guardrails]
description = "Validate path and architecture guardrails"
run = """
bash scripts/path-lint.sh
bash scripts/move-validation.sh
bash scripts/architecture-guardrails.sh
"""

[tasks."test:packages:go"]
description = "Go SDK tests"
run = "cd packages/sdk/hush-go && CGO_ENABLED=0 go test ./..."

[tasks."test:packages:go:build"]
description = "Go SDK build check"
run = "cd packages/sdk/hush-go && CGO_ENABLED=0 go build ./..."

[tasks."test:conformance"]
description = "Run cross-SDK canonical/policy conformance vectors"
run = "bash scripts/run-sdk-conformance.sh"

[tasks.ci]
description = "Run full CI checks locally"
run = """
cargo fmt --all -- --check
cargo clippy --workspace -- -D warnings
cargo test --workspace
(cd apps/desktop && bun install --frozen-lockfile)
(cd apps/desktop && bun run typecheck)
(cd apps/desktop && bun run test)
(cd apps/desktop && bun run build)
cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml
cargo check --manifest-path apps/agent/src-tauri/Cargo.toml
bash scripts/path-lint.sh
bash scripts/move-validation.sh
bash scripts/architecture-guardrails.sh
"""

[tasks.registry-smoke]
description = "Run registry end-to-end smoke test"
run = "bash tests/registry-smoke.sh"

# ---------------------------------------------------------------------------
# Formal verification tasks (Phase 5)
# ---------------------------------------------------------------------------

[tasks.verify-policies]
description = "Run Z3 policy verification on all built-in rulesets"
run = """
for f in rulesets/*.yaml; do
  echo "==> Verifying $f"
  cargo run -p hush-cli --quiet -- policy verify "$f" || exit 1
done
echo "All policy rulesets verified."
"""

[tasks.verify-lean]
description = "Build Lean 4 formal specification and check proofs"
run = """
cd formal/lean4/ClawdStrike && ~/.elan/bin/lake build
"""

[tasks.diff-test]
description = "Run differential tests (spec vs impl) with configurable case count"
env = { PROPTEST_CASES = "10000" }
run = """
echo "Running differential tests with PROPTEST_CASES=${PROPTEST_CASES}"
cargo test -p formal-diff-tests --release -- --nocapture
"""

[tasks."diff-test-nightly"]
description = "Run 100M differential tests in release mode (nightly Cedar-style)"
env = { PROPTEST_CASES = "100000000" }
run = """
echo "=== Nightly Differential Test Run (100M cases) ==="
echo "Start: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
time cargo test -p formal-diff-tests --release -- --nocapture
echo "End: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
"""

[tasks.regenerate-aeneas]
description = "Regenerate Aeneas Lean output from Rust source"
run = "./formal/scripts/regenerate-aeneas.sh"

[tasks.check-aeneas]
description = "Check that Aeneas Lean output matches committed Impl/ files"
run = "./formal/scripts/regenerate-aeneas.sh --check"

[tasks.verify-all]
description = "Run all formal verification checks (policies + diff tests + Lean build)"
depends = ["verify-policies", "diff-test", "verify-lean"]
