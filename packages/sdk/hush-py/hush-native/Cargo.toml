[package]
name = "hush-native"
version = "0.2.2"
edition = "2021"
description = "Bundled native Rust extension for clawdstrike Python SDK"
license = "Apache-2.0"

[lib]
name = "hush_native"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.28", features = ["extension-module", "abi3-py310"] }
hush-core = { workspace = true }
clawdstrike = { workspace = true, features = ["full"] }
clawdstrike-policy-event = { workspace = true, features = ["simulate"] }
futures = { workspace = true }
base64 = { workspace = true }
hex = "0.4"
serde_json = "1.0"

[build-dependencies]
pyo3-build-config = "0.28"

[lints]
workspace = true
