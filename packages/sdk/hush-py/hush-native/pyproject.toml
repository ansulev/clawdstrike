[build-system]
requires = ["maturin>=1.4,<2.0"]
build-backend = "maturin"

[project]
name = "clawdstrike"
version = "0.2.2"
description = "Python SDK for clawdstrike security verification"
readme = "../README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [
    { name = "Clawdstrike Contributors" }
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security",
    "Typing :: Typed",
]
dependencies = [
    "pynacl>=1.5.0",
    "pyyaml>=6.0",
    "pycryptodome>=3.19.0",
    "wcmatch>=8.5",
]

[project.optional-dependencies]
attestation = ["httpx>=0.25"]
hunt = ["nats-py>=2.0", "httpx>=0.25"]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "pytest-cov>=4.0",
    "mypy>=1.0",
    "ruff>=0.1",
    "types-PyYAML>=6.0",
    "httpx>=0.25",
]

[tool.maturin]
python-source = "python"
module-name = "clawdstrike._native"
features = ["pyo3/extension-module", "pyo3/abi3-py310"]
